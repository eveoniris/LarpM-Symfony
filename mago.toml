editor-url = "phpstorm://open?file=%file%&line=%line%&column=%column%"
php-version = "8.4"

[source]
paths        = ["src", "tests"]
excludes     = ["var", "public/index.php"]
includes     = ["vendor"]

# ── Linter ────────────────────────────────────────────────────────────────
[linter]
baseline     = "linter-baseline.toml"
integrations = ["symfony", "phpunit", "doctrine", "carbon"]

# ── Analyzer ──────────────────────────────────────────────────────────────
[analyzer]
baseline     = "analysis-baseline.toml"
plugins = ["stdlib", "psl", "psr-container"]

# ── Formatter ─────────────────────────────────────────────────────────────
[formatter]
preset       = "psr-12"
print-width  = 200
tab-width    = 4
end-of-line  = "lf"
trailing-comma = true
space-within-grouping-parenthesis = false
space-around-assignment-in-declare = false
preserve-breaking-conditional-expression = true
# Respecte les chaînes de méthodes écrites en multi-ligne : ne les recolle pas
# en une seule ligne même si elles tiennent dans print-width (comme les fluent
# builders Doctrine ->createQuery()->setParameter()->getResult()).
preserve-breaking-member-access-chain = true
space-before-arrow-function-parameter-list-parenthesis = true
parentheses-in-exit-and-die = false
# Preserve (new Foo())->method() — removing parens changes precedence in PHP < 8.4
# TODO: once all patterns are tested, set to false and refactor to new Foo()->method()
parentheses-around-new-in-member-access = true
