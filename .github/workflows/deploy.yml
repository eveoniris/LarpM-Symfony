name: Deploy to Production

on:
  # Auto-deploy when CI passes on main
  push:
    branches: [ main ]

  # Manual trigger (e.g. to re-deploy without a code change)
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run database migrations'
        required: true
        default: 'true'
        type: boolean
      clear_cache:
        description: 'Clear Symfony cache'
        required: true
        default: 'true'
        type: boolean

# Only one deploy runs at a time; later ones queue
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to OVH
    runs-on: ubuntu-latest
    # Only deploy when CI passes (for auto-deploy from push)
    # For workflow_dispatch, CI check is manual responsibility
    environment: production
    # TODO: re-enable once SSH_PRIVATE_KEY / SSH_HOST / SSH_USER / DEPLOY_PATH
    # secrets are configured in the repository settings.
    if: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations || 'true' }}
          CLEAR_CACHE: ${{ github.event.inputs.clear_cache || 'true' }}
        run: |
          ssh $SSH_USER@$SSH_HOST bash -s << 'ENDSSH'
            set -e

            echo "==> Navigating to deploy path"
            cd $DEPLOY_PATH

            echo "==> Pulling latest code from main"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Installing Composer dependencies (no dev)"
            composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --prefer-dist

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              echo "==> Running database migrations"
              php bin/console doctrine:migrations:migrate \
                --no-interaction \
                --env=prod
            fi

            if [ "$CLEAR_CACHE" = "true" ]; then
              echo "==> Clearing Symfony cache"
              php -d memory_limit=-1 bin/console cache:clear --env=prod --no-warmup
              php bin/console cache:warmup --env=prod
            fi

            echo "==> Compiling assets"
            php bin/console asset-map:compile --env=prod

            echo "==> Deployment complete"
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to production FAILED. Check logs above."
          # Optional: add Slack/Discord webhook notification here
          # curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          #   -H "Content-Type: application/json" \
          #   -d '{"content":"⚠️ LarpManager deploy FAILED on main"}'
