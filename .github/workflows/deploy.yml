name: Deploy to Production

on:
  # Auto-deploy when CI passes on prod branch
  workflow_run:
    workflows: ["CI"]
    branches: [prod]
    types: [completed]

  # Manual trigger — forces deploy regardless of CI (e.g. linter failure only)
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Lancer les migrations'
        required: true
        default: 'true'
        type: boolean
      clear_cache:
        description: 'Vider le cache Symfony'
        required: true
        default: 'true'
        type: boolean

# Only one deploy runs at a time; later ones queue
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to OVH
    runs-on: ubuntu-latest
    environment: production
    # Auto: only when CI passed. Manual (workflow_dispatch): always.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          MAILER_DSN: ${{ secrets.MAILER_DSN }}
          RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations || 'true' }}
          CLEAR_CACHE: ${{ github.event.inputs.clear_cache || 'true' }}
        run: |
          # Encode le MAILER_DSN (secret) en base64 pour le transmettre au serveur sans
          # risque de caractères spéciaux/quoting. Vide si le secret n'est pas défini.
          MAILER_DSN_B64=$(printf '%s' "$MAILER_DSN" | base64 | tr -d '\n')
          ssh $SSH_USER@$SSH_HOST bash -s << ENDSSH
            set -e

            echo "==> Navigating to deploy path"
            cd $DEPLOY_PATH

            echo "==> Pulling latest code from prod"
            git fetch origin prod
            git reset --hard origin/prod

            echo "==> Restauration des tuiles colorées (public/img/map/)"
            mkdir -p public/img/map
            cp -rf assets/img/map/. public/img/map/
            echo "  -> tuiles synchronisées depuis assets/img/map/"

            echo "==> Resolving Composer"
            if command -v composer &>/dev/null; then
              COMPOSER_CMD="composer"
            elif [ -f composer.phar ]; then
              COMPOSER_CMD="php composer.phar"
            else
              curl -sS https://getcomposer.org/installer | php -- --filename=composer.phar
              COMPOSER_CMD="php composer.phar"
            fi

            echo "==> Installing Composer dependencies (no dev, no scripts)"
            APP_ENV=prod \$COMPOSER_CMD install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --prefer-dist \
              --no-scripts

            # Écrit le MAILER_DSN dans .env.prod.local (prioritaire sur .env.local pour prod,
            # non versionné) uniquement si le secret est fourni. Sinon on ne touche à rien :
            # la prod garde sa configuration d'envoi existante.
            MAILER_DSN_B64='$MAILER_DSN_B64'
            if [ -n "\$MAILER_DSN_B64" ]; then
              echo "==> Writing MAILER_DSN to .env.prod.local"
              printf 'MAILER_DSN=%s\n' "\$(printf '%s' "\$MAILER_DSN_B64" | base64 --decode)" > .env.prod.local
            fi

            echo "==> Dumping compiled env for production"
            APP_ENV=prod APP_DEBUG=0 \$COMPOSER_CMD dump-env prod

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              echo "==> Running database migrations"
              APP_ENV=prod php bin/console doctrine:migrations:migrate \
                --no-interaction
            fi

            if [ "$CLEAR_CACHE" = "true" ]; then
              echo "==> Clearing Symfony cache"
              # Sur l'hébergement mutualisé OVH (NFS), 'rm -rf var/cache/prod' peut échouer
              # avec "Directory not empty" : des fichiers .nfs* sont recréés tant qu'un
              # process garde des fichiers ouverts, ce qui empêche la suppression du dossier
              # parent. On déplace donc le cache hors du chemin (rename atomique, insensible
              # à ce problème) avant de le supprimer en best-effort. Cela évite aussi le
              # conflit de rename de cache:clear ("target var/cache/prod already exists").
              if [ -d var/cache/prod ]; then
                mv var/cache/prod var/cache/prod.old.\$\$ || true
              fi
              rm -rf var/cache/prod.old.* var/cache/prod__* 2>/dev/null || true
              APP_ENV=prod php -d memory_limit=-1 bin/console cache:clear --no-warmup
              APP_ENV=prod php bin/console cache:warmup
            fi

            echo "==> Installing importmap vendor assets"
            APP_ENV=prod php bin/console importmap:install

            echo "==> Compiling assets"
            APP_ENV=prod php bin/console asset-map:compile

            echo "==> Deployment complete"
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to production FAILED. Check logs above."
          # Optional: add Discord webhook notification here
          # curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          #   -H "Content-Type: application/json" \
          #   -d '{"content":"⚠️ LarpManager deploy FAILED on prod"}'
