name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

env:
  PHP_VERSION: "8.4"

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Mago — format / lint / analyze (priority)
  # ──────────────────────────────────────────────────
  mago:
    name: Mago (format · lint · analyze)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ctype, iconv, intl, pdo, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup Mago
        uses: nhedger/setup-mago@v1

      - name: Mago — check formatting
        run: mago format --dry-run
        continue-on-error: true   # remove once formatter is aligned

      - name: Mago — lint
        run: mago lint --reporting-format=github
        continue-on-error: true   # remove once linter baseline is clean

      - name: Mago — analyze
        run: mago analyze --reporting-format=github
        continue-on-error: true   # remove once analysis baseline is clean

  # ──────────────────────────────────────────────────
  # Job 2: Code style & static analysis (secondary)
  # ──────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ctype, iconv, intl, pdo, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP CS Fixer — check style
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction
        continue-on-error: true   # remove once codebase is clean

      - name: PHP CodeSniffer — PSR-12 check
        run: ./vendor/bin/phpcs
        continue-on-error: true   # remove once codebase is clean

      - name: PHPStan — static analysis (level 6)
        run: |
          # Generate baseline on first run if it doesn't exist yet:
          # php -d memory_limit=-1 vendor/bin/phpstan analyse --generate-baseline phpstan-baseline.neon
          php -d memory_limit=-1 vendor/bin/phpstan analyse \
            --no-progress --error-format=github \
            --configuration=phpstan.dist.neon
        continue-on-error: true   # remove once baseline is clean

  # ──────────────────────────────────────────────────
  # Job 3: Tests (requires MySQL)
  # ──────────────────────────────────────────────────
  tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: [mago, lint]

    services:
      database:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: larpm_test
          MYSQL_USER: admin
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ctype, iconv, intl, pdo, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create .env.test.local
        run: |
          echo "DATABASE_URL=mysql://admin:password@127.0.0.1:3306/larpm" >> .env.test.local

      - name: Generate JWT keys
        # JWT_SECRET_KEY / JWT_PUBLIC_KEY / JWT_PASSPHRASE are already defined in .env
        # (no passphrase locally). The Lexik command reads those values directly.
        env:
          APP_ENV: test
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Create test database schema
        env:
          APP_ENV: test
        run: |
          # Drop + recreate to get a clean empty DB (MySQL service pre-creates it but empty)
          php bin/console doctrine:database:drop --force --if-exists --env=test
          php bin/console doctrine:database:create --env=test
          # Build schema from entities directly — migrations are not designed for fresh-DB runs
          php bin/console doctrine:schema:create --env=test

      - name: Run PHPUnit
        env:
          APP_ENV: test
        run: ./vendor/bin/phpunit --log-junit var/log/junit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-results
          path: var/log/junit.xml
          retention-days: 7
